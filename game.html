<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fertile Crescent — Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="game">
    <canvas id="game-board" aria-label="Fertile Crescent game board"></canvas>
    <aside class="resource-bar" aria-label="Resources">
      <ul class="resource-list">
        <li class="resource" data-resource="stone">
          <span class="resource-label">Stone</span>
          <span class="resource-value" id="resource-stone">20</span>
        </li>
        <li class="resource" data-resource="wood">
          <span class="resource-label">Wood</span>
          <span class="resource-value" id="resource-wood">40</span>
        </li>
        <li class="resource" data-resource="food">
          <span class="resource-label">Food</span>
          <span class="resource-value" id="resource-food">40</span>
        </li>
        <li class="resource" data-resource="labor">
          <span class="resource-label">Labor</span>
          <span class="resource-value" id="resource-labor">20</span>
        </li>
      </ul>
    </aside>
  </main>
  <script src="js/resources.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
